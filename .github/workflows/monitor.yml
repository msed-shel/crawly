name: Radio 88.6 Monitor

on:
  workflow_dispatch: {}   # triggered by the external cron pinger (cron-job.org)
  # Kept as a fallback; the pinger drives the real cadence.
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  # If a new run starts while one is still going, drop the stale one instead of
  # queueing behind it — prevents a backlog when runs are frequent.
  group: radio-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # hard cap so a run can never hang indefinitely
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No setup-python: ubuntu-latest already has python3, and monitor.py
      # uses only the standard library, so there's nothing to install.
      - name: Run monitor
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          ARTIST_TO_WATCH: ${{ secrets.ARTIST_TO_WATCH }}
        run: |
          [ -z "$NTFY_URL" ] && unset NTFY_URL
          [ -z "$ARTIST_TO_WATCH" ] && unset ARTIST_TO_WATCH
          python3 monitor.py

      - name: Persist state and log
        run: |
          if [ -n "$(git status --porcelain notified.json events.log)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add notified.json events.log
            git commit -m "Update state/log [skip ci]"
            # Rebase on anything another run may have pushed, then push.
            git pull --rebase --autostash origin main || true
            git push || echo "Push skipped (another run won the race)."
          else
            echo "No state or log change to commit."
          fi
